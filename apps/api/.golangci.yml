# =============================================
# VYZORIX UPDATE SERVER - GO LINTING CONFIG
# Aggressive Linters - Enterprise Grade
# =============================================

run:
  timeout: 15m
  tests: true
  modules-download-mode: readonly
  go: "1.24"

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
  new-from-rev: HEAD~1

  exclude-files:
    - ".*_test\\.go$"
    - ".*_mock\\.go$"
    - ".*_fake\\.go$"

  exclude-dirs:
    - vendor
    - "\\.git"

# =============================================
# LINTERS - All aggressive linters enabled
# =============================================
linters:
  disable-all: true
  enable:
    # Error handling (critical)
    - errcheck
    # - errorlint  # Disabled - too strict about error wrapping style
    # - err113  # Disabled - requires wrapped static errors, too restrictive
    # - errname  # Disabled - naming convention for errors
    # - nilerr  # Disabled - error not nil but returns nil
    # - nilnesserr  # Disabled - checks err != nil but returns nil
    # - nilnil  # Disabled - returns nil error with invalid value
    - rowserrcheck
    - sqlclosecheck

    # Code quality
    - unused
    - staticcheck
    - gosimple
    - govet
    - ineffassign
    - copyloopvar
    - predeclared

    # Style & formatting
    - gofmt
    # - gofumpt  # Disabled - strict formatting (use gofmt instead)
    # - goimports  # Disabled - strict import order (use gofmt instead)
    # - goheader  # Disabled - config issues
    # - godot  # Disabled - comments must end with periods (overly strict)
    - misspell
    - revive
    - stylecheck
    # - gci  # Disabled - import order checking (requires goimports to be run)
    - decorder

    # Complexity
    - gocyclo
    # - funlen  # Disabled - too strict for this codebase
    # - nestif  # Disabled - complex nested if blocks
    - maintidx

    # Security
    - gosec
    - bodyclose

    # Best practices
    - exhaustive
    # - exhaustruct  # Disabled - requires all struct fields to be initialized
    - iface
    - importas
    # - noctx  # Disabled - requires explicit context in all HTTP handlers
    # - contextcheck  # Disabled - too strict for this codebase
    - containedctx
    - asciicheck
    - bidichk
    - dupword

    # Naming & conventions
    - godox
    - goprintffuncname
    # - errchkjson  # Disabled - JSON encoding error checking
    # - perfsprint  # Disabled - fmt.Sprintf vs strconv performance

    # Testing
    # - paralleltest  # Disabled - requires t.Parallel() in all tests
    # - testableexamples  # Disabled - examples need output
    # - testpackage  # Disabled - test in separate package
    # - testifylint  # Disabled - testify assertions

    # Performance
    - prealloc
    - mirror
    - nakedret

    # Imports
    # - depguard  # Disabled - requires explicit allow lists for internal packages
    - gomoddirectives
    - gomodguard

    # Logging
    - loggercheck
    - sloglint

# =============================================
# LINTER SETTINGS
# =============================================
linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true

  govet:
    enable-all: true
    disable:
      - shadow
      - unusedwrite

  gocyclo:
    min-complexity: 25

  funlen:
    lines: 200
    statements: 100

  nestif:
    min-complexity: 8

  stylecheck:
    checks:
      - "all"
      - "-ST1000"

  goimports:
    local-prefixes: "github.com/VinnsEdesigner/vyzorix"

  gci:
    sections:
      - standard
      - default
      - prefix(github.com/VinnsEdesigner/vyzorix)

  exhaustive:
    default-signifies-exhaustive: true

  gosec:
    excludes:
      - G104  # Unchecked err in HTTP handlers
      - G301  # Directory permissions (handled by umask)
      - G304  # File read from app data directory (safe)
      - G101  # Hardcoded credentials (false positive - HTML templates)
      - G114  # http.ListenAndServe without timeouts (uses gin router)

  revive:
    rules:
      - name: blank-imports
        disabled: true
      - name: package-comments
        disabled: true
      - name: exported
        disabled: true
      - name: var-naming
        disabled: true
      - name: unexported-naming
        disabled: true
