# =============================================
# VYZORIX UPDATE SERVER - GO LINTING CONFIG
# =============================================

# Linters to run - essential linters only
linters:
  disable-all: true
  enable:
    # Error handling - disable for now
    # - errcheck
    # - gosec

    # Syntax & parsing - disable for now
    # - gofmt
    # - govet

    # Code quality (relaxed)
    - unused

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true

  govet:
    enable-all: true
    disable:
      - shadow
      - unusedwrite

issues:
  exclude-use-default: true
  max-issues-per-linter: 0
  max-same-issues: 0

run:
  timeout: 10m
  tests: true
  modules-download-mode: readonly
  go: "1.24"
