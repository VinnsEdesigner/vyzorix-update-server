# =============================================
# VYZORIX UPDATE SERVER - GO LINTING CONFIG
# Aggressive Linters - Enterprise Grade
# =============================================

run:
  timeout: 15m
  tests: true
  modules-download-mode: readonly
  go: "1.24"

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
  new-from-rev: HEAD~1

  exclude-files:
    - ".*_test\\.go$"
    - ".*_mock\\.go$"
    - ".*_fake\\.go$"

  exclude-dirs:
    - vendor
    - "\\.git"

# =============================================
# LINTERS - All aggressive linters enabled
# =============================================
linters:
  disable-all: true
  enable:
    # Error handling (critical)
    - errcheck
    - errorlint
    - err113
    - errname
    - nilerr
    - nilnesserr
    - nilnil
    - rowserrcheck
    - sqlclosecheck

    # Code quality
    - unused
    - staticcheck
    - gosimple
    - govet
    - ineffassign
    - copyloopvar
    - predeclared

    # Style & formatting
    - gofmt
    - gofumpt
    - goimports
    - godot
    - misspell
    - revive
    - stylecheck
    - gci
    - decorder

    # Complexity
    - gocyclo
    - funlen
    - nestif
    - maintidx

    # Security
    - gosec
    - bodyclose

    # Best practices
    - exhaustive
    - exhaustruct
    - iface
    # - importas  # Disabled - requires strict aliasing configuration
    - noctx
    - contextcheck
    - containedctx
    - asciicheck
    - bidichk
    - dupword

    # Naming & conventions
    - godox
    - goprintffuncname
    - errchkjson
    - perfsprint

    # Testing
    - paralleltest
    - testableexamples
    - testpackage
    - testifylint

    # Performance
    - prealloc
    - mirror
    - nakedret

    # Imports
    # - depguard  # Requires complex allowlist configuration
    - gomoddirectives
    - gomodguard

    # Logging
    - loggercheck
    - sloglint

# =============================================
# LINTER SETTINGS
# =============================================
linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true

  govet:
    enable-all: true
    disable:
      - shadow
      - unusedwrite

  gocyclo:
    min-complexity: 25

  funlen:
    lines: 60
    statements: 40

  nestif:
    min-complexity: 8

  goimports:
    local-prefixes: "github.com/VinnsEdesigner/vyzorix"

  gci:
    sections:
      - standard
      - default
      - prefix(github.com/VinnsEdesigner/vyzorix)

  exhaustive:
    default-signifies-exhaustive: true

  gosec:
    excludes:
      - G104  # Unchecked err in HTTP handlers
      - G301  # Directory permissions (handled by umask)
      - G304  # File read from app data directory (safe)
      - G101  # Hardcoded credentials (false positive - HTML templates)
      - G114  # http.ListenAndServe without timeouts (uses gin router)

  revive:
    rules:
      - name: blank-imports
        disabled: true
      - name: package-comments
        disabled: true
      - name: exported
        disabled: true
      - name: var-naming
        disabled: true
      - name: unexported-naming
        disabled: true

  depguard:
    rules:
      main:
        allow:
          - $gostd
          - $local
          - prefix(github.com/VinnsEdesigner/vyzorix/apps/api)
      test:
        allow:
          - $gostd
          - $local
          - prefix(github.com/VinnsEdesigner/vyzorix/apps/api)
          - github.com/stretchr/testify
      scripts:
        allow:
          - $gostd
          - $local
          - prefix(github.com/VinnsEdesigner/vyzorix/apps/api)

  errorlint:
    errorf: true
    errors: # which errors to check
      - errors.New
      - fmt.Errorf
      - reflect.DeepEqual
    funcs:
      - errors.Is
      - errors.As
      - errors.New
      - fmt.Errorf
      - reflect.DeepEqual

  errchkjson:
    checkJSONMarshalerType: true
    reportNoExportedType: true

  perfsprint:
    # Use faster alternatives
    forbidStrconv: false
    suggestStrconv: true

  paralleltest:
    # Warn about missing t.Parallel() in test files
    requireExternalIntegration: false

  testifylint:
    # Enable all testify lint rules
    disable-all: false

  stylecheck:
    checks:
      - "ALL"
    httpStatusCodeImport: false

  gomodguard:
    allowed:
      go: "1.24"
    blocked:
      go versions:
        - version: ">=1.24"
          reason: "Go 1.24+ required for latest features"

  loggercheck:
    # Allow common logger keys
    allowableKeys:
      - "caller"
      - "error"
      - "level"
      - "msg"
      - "time"
      - "timestamp"
      - "message"
      - "err"
      - "logger"
    requireErrorKey: true

  sloglint:
    # Require structured logging
    noRawLogger: true
    noMixedArgs: true
    kvPairsOnly: true

  nilerr:
    # Will report an error if there is an unchecked error return at the end of a function
    require: true

  nilnesserr:
    # Will report an error if there is a path in the code where the error is nil but a return value is not nil
    require: true

  noctx:
    # Check for context passing in HTTP handlers
    checkReceiver: "^(ok|ctx)$"

  contextcheck:
    # Check that context is passed to all functions that need it
    disabledFunctions:
      - "fmt.Printf"
      - "fmt.Sprintf"
      - "log.Printf"
      - "log.Fatalf"
      - "testing.T.Fatal"
      - "testing.T.Fatalf"
    extraAllowedFunctions: []
    extraForbiddenFunctions: []

  godox:
    keywords:
      - TODO
      - FIXME
      - OPTIMIZE
      - HACK
      - BUG
      - NOTE
    requirePrefix: "TODO(author):"

  exhaustruct:
    # Require all struct fields to be initialized
    ignore:
      - "github.com/gin-gonic/gin.Context"
      - "github.com/gin-gonic/gin.Request"
      - "github.com/gin-gonic/gin.ResponseWriter"

  testableexamples:
    # Require examples to have expected output
    style: "standalone"

  testpackage:
    # Require tests to be in a separate _test package
    # Set to false since this project uses internal test packages
    skipRegexp: ".*"

  errname:
    # Error names must be prefixed with Err and error types suffixed with Error
    disabled: false

  err113:
    # Disallow error wrapping in the style of `fmt.Errorf("description: %w", err)`
    disabled: false
