# =============================================
# VYZORIX UPDATE SERVER - GO LINTING CONFIG
# =============================================
# golangci-lint v2.x configuration
# =============================================

# Linters to run
linters:
  disable-all: true
  enable:
    # Error handling
    - errcheck
    - gosec
    - noctx
    - nilerr
    - errname

    # Syntax & parsing
    - gofmt
    - govet
    - goimports
    - misspell

    # Code quality
    - bodyclose
    - decorder
    - errorlint
    - gocritic
    - gocyclo
    - nakedret
    - unconvert
    - unparam
    - unused
    - wrapcheck

    # Performance
    - prealloc

    # Best practices
    - containedctx
    - contextcheck
    - copyloopvar
    - durationcheck
    - exhaustive
    - gosimple
    - nilness
    - sqlclosecheck
    - staticcheck
    - typecheck

    # Style
    - asciicheck
    - bidichk
    - commentspelling
    - cyclop
    - dupl
    - exportloopref
    - forbidigo
    - gochecknoglobals
    - gochecknoinits
    - goconst
    - gocognit
    - goheader
    - grouper
    - lll
    - maintidx
    - misspell
    - nlreturn
    - nolintlint
    - paralleltest
    - revive
    - stylecheck
    - testpackage
    - whitespace

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true

  govet:
    enable-all: true
    disable:
      - shadow
      - unusedwrite

  gocritic:
    enabled-tags:
      - diagnostic
      - performance
      - style

  gocyclo:
    min-complexity: 15

  dupl:
    threshold: 75

  goimports:
    local-prefixes: github.com/VinnsEdesigner/vyzorix

  misspell:
    locale: US

  nolintlint:
    require-explanation: true
    require-specific: true

  whitespace:
    multi-if: true
    multi-func: true

  gosec:
    excludes:
      - G104

  staticcheck:
    checks:
      - "all"

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0

  exclude-rules:
    # Allow certain lints in test files
    - path: _test\.go
      linters:
        - dupl
        - gocyclo
        - gosec
        - errcheck

    # Skip generated files
    - path: .*\.pb\.go
      linters:
        - unused
        - structcheck

    # Skip vendor
    - path: vendor
      linters:
        - unused
        - staticcheck
        - errcheck

run:
  timeout: 10m
  tests: true
  modules-download-mode: readonly
  go: "1.22"
