# =============================================
# VYZORIX UPDATE SERVER - GO LINTING CONFIG
# Aggressive Linters - Enterprise Grade
# =============================================

run:
  timeout: 15m
  tests: true
  modules-download-mode: readonly
  go: "1.24"

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
  new-from-rev: HEAD~1

  exclude-files:
    - ".*_test\\.go$"
    - ".*_mock\\.go$"
    - ".*_fake\\.go$"

  exclude-dirs:
    - vendor
    - "\\.git"

# =============================================
# LINTERS - All aggressive linters enabled
# =============================================
linters:
  disable-all: true
  enable:
    # Error handling (critical)
    - errcheck
    - errorlint
    # - err113  # Disabled - too strict, requires code restructuring
    - errname
    - nilerr
    - nilnesserr
    - nilnil
    - rowserrcheck
    - sqlclosecheck

    # Code quality
    - unused
    - staticcheck
    - gosimple
    - govet
    - ineffassign
    - copyloopvar
    - predeclared

    # Style & formatting
    - gofmt
    - gofumpt
    - goimports
    - godot
    - misspell
    - revive
    - stylecheck
    - gci
    - decorder

    # Complexity
    - gocyclo
    - funlen
    - nestif
    - maintidx

    # Security
    - gosec
    - bodyclose

    # Best practices
    - exhaustive
    - exhaustruct
    - iface
    - noctx
    # - contextcheck  # Disabled - too strict, requires code restructuring
    - containedctx
    - asciicheck
    - bidichk
    - dupword

    # Naming & conventions
    - godox
    - goprintffuncname
    - errchkjson
    - perfsprint

    # Testing
    - paralleltest
    - testableexamples
    - testpackage
    - testifylint

    # Performance
    - prealloc
    - mirror
    - nakedret

    # Imports
    - gomoddirectives
    - gomodguard

    # Logging
    - loggercheck
    - sloglint

# =============================================
# LINTER SETTINGS
# =============================================
linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true

  govet:
    enable-all: true
    disable:
      - shadow
      - unusedwrite

  gocyclo:
    min-complexity: 25

  funlen:
    lines: 60
    statements: 40

  nestif:
    min-complexity: 8

  goimports:
    local-prefixes: "github.com/VinnsEdesigner/vyzorix"

  gci:
    sections:
      - standard
      - default
      - prefix(github.com/VinnsEdesigner/vyzorix)

  exhaustive:
    default-signifies-exhaustive: true

  gosec:
    excludes:
      - G104  # Unchecked err in HTTP handlers
      - G301  # Directory permissions (handled by umask)
      - G304  # File read from app data directory (safe)
      - G101  # Hardcoded credentials (false positive - HTML templates)
      - G114  # http.ListenAndServe without timeouts (uses gin router)

  revive:
    rules:
      - name: blank-imports
        disabled: true
      - name: package-comments
        disabled: true
      - name: exported
        disabled: true
      - name: var-naming
        disabled: true
      - name: unexported-naming
        disabled: true
