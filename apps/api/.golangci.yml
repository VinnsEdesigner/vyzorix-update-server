version: "2"
run:
  go: "1.24"
  modules-download-mode: readonly
  tests: true
  timeout: 15m
linters:
  default: none
  enable:
    - asciicheck
    - bidichk
    - bodyclose
    - containedctx
    - copyloopvar
    - decorder
    - dupword
    - errcheck
    - errchkjson
    - errname
    - exhaustive
    - funlen
    - gocyclo
    - godot
    - godox
    - gomoddirectives
    - gomodguard_v2
    - goprintffuncname
    - gosec
    - govet
    - iface
    - ineffassign
    - loggercheck
    - maintidx
    - mirror
    - misspell
    - nakedret
    - nestif
    - nilerr
    - nilnesserr
    - nilnil
    - noctx
    - paralleltest
    - perfsprint
    - prealloc
    - predeclared
    - revive
    - rowserrcheck
    - sloglint
    - sqlclosecheck
    - staticcheck
    - testableexamples
    - testifylint
    - testpackage
    - unused
  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
    exhaustive:
      default-signifies-exhaustive: true
    funlen:
      lines: 150
      statements: 80
    gocyclo:
      min-complexity: 25
    gosec:
      excludes:
        - G104
        - G118
        - G301
        - G304
        - G101
        - G114
    govet:
      disable:
        - fieldalignment
        - shadow
        - unusedwrite
      enable-all: true
    nestif:
      min-complexity: 20
    revive:
      rules:
        - name: blank-imports
          disabled: true
        - name: package-comments
          disabled: true
        - name: exported
          disabled: true
        - name: var-naming
          disabled: true
        - name: unexported-naming
          disabled: true
  exclusions:
    generated: lax
    paths:
      - .*_test\.go$
      - .*_mock\.go$
      - .*_fake\.go$
      - vendor
      - \.git
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  new-from-rev: HEAD~1
formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
    - goimports
  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/VinnsEdesigner/vyzorix)
    goimports:
      local-prefixes:
        - github.com/VinnsEdesigner/vyzorix
  exclusions:
    generated: lax
    paths:
      - .*_test\.go$
      - .*_mock\.go$
      - .*_fake\.go$
      - vendor
      - \.git
      - third_party$
      - builtin$
      - examples$
