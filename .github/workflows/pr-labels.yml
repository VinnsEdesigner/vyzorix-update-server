name: PR Labels

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, opened]
  pull_request_target:

jobs:
  label-pr:
    name: Label PR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    
    steps:
      - name: Check PR size
        uses: actions/github-script@v7
        with:
          script: |
            const { github, context } = require('@actions/github');
            const pr = context.payload.pull_request;
            const additions = pr.additions || 0;
            const deletions = pr.deletions || 0;
            const changes = additions + deletions;

            // Remove existing size labels
            const sizeLabels = ['size/xs', 'size/s', 'size/m', 'size/l', 'size/xl'];
            for (const label of sizeLabels) {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  name: label
                });
              } catch (e) {}
            }

            // Add size label
            let sizeLabel;
            if (changes < 50) sizeLabel = 'size/xs';
            else if (changes < 200) sizeLabel = 'size/s';
            else if (changes < 500) sizeLabel = 'size/m';
            else if (changes < 1000) sizeLabel = 'size/l';
            else sizeLabel = 'size/xl';

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              labels: [sizeLabel]
            });

      - name: Add type labels based on changes
        uses: actions/github-script@v7
        with:
          script: |
            const { github, context } = require('@actions/github');
            const pr = context.payload.pull_request;
            const files = pr.changed_files || 0;

            // Check for specific patterns
            const labels = [];
            
            if (files === 0) {
              labels.push('type/ci');
            } else {
              // Check title for type hints
              const title = pr.title.toLowerCase();
              if (title.includes('fix') || title.includes('bug')) labels.push('type/fix');
              if (title.includes('feat') || title.includes('feature')) labels.push('type/feature');
              if (title.includes('docs') || title.includes('readme')) labels.push('type/docs');
              if (title.includes('refactor')) labels.push('type/refactor');
              if (title.includes('test')) labels.push('type/test');
            }

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: labels
              });
            }

      - name: Auto-assign reviewers
        if: contains(github.event.pull_request.labels.*.name, 'type/fix')
        uses: actions/github-script@v7
        with:
          script: |
            const { github, context } = require('@actions/github');
            // Add code owner as reviewer for fixes
            try {
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                team_reviewers: ['code-owners']
              });
            } catch (e) {
              console.log('Could not request review from code owners');
            }