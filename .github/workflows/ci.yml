name: CI

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main, develop]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # =============================================
  # CONFIGURATION GUARDIANS
  
  # =============================================
  linter-config-guardian:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            tooling/scripts/validate-golangci-config.sh
            apps/api/.golangci.yml
          sparse-checkout-cone-mode: false

      - name: Validate Go linter config
        run: |
          chmod +x tooling/scripts/validate-golangci-config.sh
          ./tooling/scripts/validate-golangci-config.sh

  eslint-config-guardian:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            tooling/scripts/validate-eslint-config.sh
            apps/web/eslint.config.js
            apps/web/package.json
          sparse-checkout-cone-mode: false

      - name: Validate ESLint config
        run: |
          chmod +x tooling/scripts/validate-eslint-config.sh
          ./tooling/scripts/validate-eslint-config.sh

  # =============================================
  # SECURITY VALIDATOR
  
  # =============================================
  security-validator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run security validation
        run: |
          chmod +x tooling/scripts/validate-security.sh
          ./tooling/scripts/validate-security.sh

  # =============================================
  # DEPENDENCY AUDITOR
  
  # =============================================
  dependency-auditor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: null

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Run dependency audit
        run: |
          chmod +x tooling/scripts/validate-dependencies.sh
          ./tooling/scripts/validate-dependencies.sh

  # =============================================
  # TYPESCRIPT STRICT VALIDATOR

  # =============================================
  typescript-strict-validator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run TypeScript strict validation
        run: |
          chmod +x tooling/scripts/validate-typescript-strict.sh
          ./tooling/scripts/validate-typescript-strict.sh

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: null  # Use version from packageManager field
          
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        
      - name: Lint
        run: pnpm lint
        
      - name: Typecheck
        run: pnpm typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: null  # Use version from packageManager field
          
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        
      - name: Test
        run: pnpm test

  go-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: apps/api/go.sum
          
      - name: Setup Go module
        run: cd apps/api && go mod tidy
          
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: apps/api
          
      - name: Run tests
        run: go test ./...
        working-directory: apps/api
