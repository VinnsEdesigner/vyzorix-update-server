version: "3.9"

services:
  vyzorix-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vyzorix-update-server
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - vyzorix-data:/data
      - ./bin:/app/bin:ro
    environment:
      - PORT=3000
      - NODE_ENV=production
      - DATABASE_URL=/data/vyzorix.db
      - VYZORIX_API_DIR=/app/data
      - VYZORIX_BIN_DIR=/app/bin
      - VYZORIX_PUBLIC_DIR=/app/public
      - DATA_DIR=/app/data
      - BIN_DIR=/app/bin
      - PUBLIC_DIR=/app/public
      - FIREBASE_CREDENTIALS=${FIREBASE_CREDENTIALS}
      - TOKEN_SECRET=${TOKEN_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
      - ENFORCE_HMAC=${ENFORCE_HMAC:-true}
      - HMAC_WINDOW_SECONDS=${HMAC_WINDOW_SECONDS:-300}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - vyzorix-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  vyzorix-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data

networks:
  vyzorix-network:
    driver: bridge
